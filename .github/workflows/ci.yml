name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  # The agent logic is fully implemented and covered by the offline suite (110+ tests: session
  # state, verification, streaming pipeline, objection classifier, judge assessment/inline rulings,
  # scorecard builder, the livekit-free voice/judge glue). Live Fireworks and the heavy voice deps
  # (requirements-voice.txt) are excluded here — see the `pytest -m "not live"` step below.
  agents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check .
      # Live Fireworks tests are marked `live` and excluded here (no API key in CI).
      - run: pytest -m "not live"

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    strategy:
      matrix:
        service: [backend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t lexpar-${{ matrix.service }}:ci ./${{ matrix.service }}
