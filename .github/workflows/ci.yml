name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  # NOTE: agents/ is a skeleton pending API keys — intentionally not in the test job yet.

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    strategy:
      matrix:
        service: [backend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t lexpar-${{ matrix.service }}:ci ./${{ matrix.service }}
