# Tooling config for the agents worker: ruff (lint + import sort) and pytest discovery.
# Only the no-key modules (session_state, verification) are implemented/tested today; the
# LLM/STT/TTS pipeline files remain skeletons pending API keys.

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
# Live Fireworks tests are DESELECTED by default (and in CI) — reported as deselected, not
# silently skipped. Run them explicitly with: pytest -m live
addopts = "-m 'not live'"
markers = [
    "live: exercises live Fireworks API calls; excluded from CI (run with: pytest -m live)",
]
