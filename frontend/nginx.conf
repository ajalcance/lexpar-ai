# nginx config for the LexPar AI frontend container (frontend/Dockerfile).
# Serves the built Vite bundle; unknown paths fall back to index.html so client-side routes
# (/dashboard, /case/:id, /session/:id, /admin, ...) resolve on hard refresh.
# API and LiveKit traffic never reach this server — Caddy routes /api/* to the backend and the
# LiveKit domain to the media server (see infra/Caddyfile).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: never cache index.html so deploys take effect immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
