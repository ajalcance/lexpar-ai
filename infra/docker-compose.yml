# Local development infrastructure for LexPar AI: Postgres + MinIO (S3-compatible object store) +
# LiveKit (real-time media server, dev mode).
# Bring up with: docker compose -f infra/docker-compose.yml up -d
# The backend and agents run on the host (or their own images) and point at these via .env.

name: lexpar

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lexpar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexpar"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

  # LiveKit media server in dev mode. `--dev` uses the default API key devkey/secret, matching
  # .env.example; LIVEKIT_KEYS makes that explicit. Not for production.
  #
  # --node-ip 127.0.0.1 is LOCALHOST-DEV-ONLY. It fixes Docker-on-macOS: without it the server
  # advertises its container-internal IP in ICE candidates, which the host browser can't reach
  # (Docker Desktop runs in a VM), so signaling succeeds but the WebRTC peer connection fails
  # ("could not establish pc connection"). This lives ONLY in this local-dev compose file — it
  # binds the media path to loopback, so the app is reachable only from the same machine. Do NOT
  # carry this flag to any shared/LAN or production deploy (docker-compose.prod.yml): pinning
  # 127.0.0.1 there would make LiveKit unreachable from every other device/browser. Production
  # advertises its real reachable address instead (or LIVEKIT_NODE_IP). See docs/LESSONS.md.
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --node-ip 127.0.0.1
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    ports:
      - "7880:7880"       # signaling: HTTP + WebSocket
      - "7881:7881"       # WebRTC / ICE over TCP
      - "7882:7882/udp"   # WebRTC / ICE over UDP

  # One-shot: create the case-files bucket, then exit.
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/lexpar-case-files;
      echo 'bucket ready'; exit 0;
      "

volumes:
  postgres_data:
  minio_data:
