# Production deployment for LexPar AI on the AMD Developer Cloud droplet (ARCHITECTURE §10).
# ADDITIVE to local dev: infra/docker-compose.yml (localhost) is untouched and keeps working —
# this file is only ever run on the droplet.
#
# Run from the repo root ON THE DROPLET (or via infra/deploy.sh):
#   docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d --build
#
# Requires a repo-root .env.prod (gitignored) — see .env.prod.example for the documented shape.
# Fresh cloud database: the postgres volume here is new; NO local/work-product data migrates to
# the (temporary) droplet. Destroying the droplet leaves local dev untouched.
#
# Topology (Caddy is the only public HTTP/S entry; LiveKit media goes direct over UDP/TCP):
#   https://$PUBLIC_DOMAIN            → caddy → frontend (static SPA)
#   https://$PUBLIC_DOMAIN/api/*      → caddy → backend  (same-origin — no CORS surface)
#   wss://$LIVEKIT_DOMAIN             → caddy → livekit:7880 (signaling)
#   udp 50000-50060 + tcp 7881        → livekit directly (WebRTC media, node-ip = public IP)

name: lexpar-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexpar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: lexpar
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexpar -d lexpar"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:?set OBJECT_STORAGE_ACCESS_KEY in .env.prod}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:?set OBJECT_STORAGE_SECRET_KEY in .env.prod}
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the case-files bucket, then exit (same pattern as local dev).
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$OBJECT_STORAGE_ACCESS_KEY\" \"$OBJECT_STORAGE_SECRET_KEY\" &&
      mc mb --ignore-existing local/lexpar-case-files &&
      echo 'bucket ready'
      "
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
    restart: "no"

  # LiveKit media server — PRODUCTION networking (contrast with local dev's `--dev --node-ip
  # 127.0.0.1`, which is loopback-only; see infra/docker-compose.yml and docs/LESSONS.md).
  # --node-ip advertises the droplet's PUBLIC IP in ICE candidates so browsers can reach the
  # media path. Real API keys come from .env.prod via LIVEKIT_KEYS (never devkey/secret off-box —
  # ARCHITECTURE §11). Signaling (7880) stays internal: Caddy terminates WSS and proxies to it.
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:?set LIVEKIT_NODE_IP in .env.prod}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?}: ${LIVEKIT_API_SECRET:?}"
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    ports:
      - "7881:7881"                       # WebRTC / ICE over TCP (fallback)
      - "50000-50060:50000-50060/udp"     # WebRTC media (must match livekit.prod.yaml)

  # One-shot: apply the Alembic schema before the backend serves (backend/Dockerfile is reused
  # unmodified — only the command differs). Re-runs are no-ops at head.
  migrate:
    build: ../backend
    command: alembic upgrade head
    env_file: ../.env.prod
    environment:
      DATABASE_URL: postgresql://lexpar:${POSTGRES_PASSWORD}@postgres:5432/lexpar
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build: ../backend
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      # In-network endpoints override the .env.prod values (which document the public view).
      DATABASE_URL: postgresql://lexpar:${POSTGRES_PASSWORD}@postgres:5432/lexpar
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiveKit Agents voice worker. Talks to LiveKit + the backend over the compose network;
  # LIVEKIT_URL in .env.prod stays the PUBLIC wss:// URL (that value is what the backend hands
  # the browser), so the worker's internal URL is overridden here.
  agents:
    build: ../agents
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      LIVEKIT_URL: ws://livekit:7880
      AGENT_BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      livekit:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      args:
        # Baked into the bundle at build time; same-origin as the app (Caddy proxies /api/*).
        VITE_API_BASE_URL: https://${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN in .env.prod}
        # Feature flags (default enabled). The public demo sets DESTRUCTIVE_ACTIONS_ENABLED=false
        # in .env.prod to hide the archive/purge UI (the backend enforces the same flag).
        VITE_DESTRUCTIVE_ACTIONS_ENABLED: ${DESTRUCTIVE_ACTIONS_ENABLED:-true}
        VITE_SHOW_DEMO_SCRIPT: ${VITE_SHOW_DEMO_SCRIPT:-true}
    restart: unless-stopped

  # The only public HTTP/S entrypoint. Auto-TLS via Let's Encrypt on the sslip.io domains.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN:?set LIVEKIT_DOMAIN in .env.prod}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - livekit

volumes:
  postgres_prod_data:
  minio_prod_data:
  caddy_data:
  caddy_config:
